<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Explorer — LT Communication Agencies</title>
<style>
  :root{
    --bg:#0e1117;--panel:#161b25;--panel2:#1c2230;--border:#2a3245;
    --text:#e6e9f0;--muted:#8b93a7;--accent:#4f8ef7;--green:#34c98e;
    --red:#f06a6a;--amber:#f0b04f;--purple:#a78bfa;--hover:rgba(79,142,247,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;line-height:1.5}
  .wrap{max-width:100%;margin:0 auto;padding:20px 24px}

  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
  header h1{font-size:22px;font-weight:700}
  header .back{color:var(--accent);text-decoration:none;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:5px 14px;transition:.15s}
  header .back:hover{background:var(--accent);color:#fff}

  /* Tabs */
  .tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:0}
  .tab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap}
  .tab:hover{color:var(--text);background:var(--panel)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--panel)}

  /* Controls strip */
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  input[type=text]{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;min-width:220px}
  input[type=text]:focus{outline:none;border-color:var(--accent)}
  .badge{background:var(--panel2);border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-size:12px;color:var(--muted)}
  .btn{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}

  /* Sheet description */
  .sheet-desc{color:var(--muted);font-size:13px;margin-bottom:14px;padding:10px 14px;background:var(--panel);border-radius:8px;border-left:3px solid var(--accent)}

  /* Table container */
  .table-wrap{overflow:auto;border:1px solid var(--border);border-radius:10px;background:var(--panel);max-height:calc(100vh - 260px)}
  table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}

  thead{position:sticky;top:0;z-index:2}
  th{background:var(--panel2);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;
     padding:10px 12px;text-align:left;border-bottom:2px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;transition:.12s}
  th:hover{color:var(--text);background:#242d3f}
  th.sorted-asc::after{content:' ▲';color:var(--accent);font-size:10px}
  th.sorted-desc::after{content:' ▼';color:var(--accent);font-size:10px}

  td{padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap;max-width:320px;overflow:hidden;text-overflow:ellipsis}
  tr:hover td{background:var(--hover)}

  /* Alternate row tinting */
  tbody tr:nth-child(even) td{background:rgba(255,255,255,.015)}
  tbody tr:nth-child(even):hover td{background:var(--hover)}

  /* Cell type styling */
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  td.pos{color:var(--green)}
  td.neg{color:var(--red)}
  td.url a{color:var(--accent);text-decoration:none}
  td.url a:hover{text-decoration:underline}
  td.null{color:var(--border);font-style:italic}

  /* Frozen first column */
  th:first-child,td:first-child{position:sticky;left:0;z-index:1;background:inherit}
  th:first-child{z-index:3;background:var(--panel2)}
  td:first-child{background:var(--panel);font-weight:600}
  tr:nth-child(even) td:first-child{background:var(--panel)}
  tr:hover td:first-child{background:var(--hover)!important}

  .row-num{color:var(--border);font-size:11px;font-weight:400;width:36px;text-align:right;padding-right:10px}

  /* Page size controls */
  .pager{display:flex;align-items:center;gap:10px;margin-top:12px;font-size:13px;color:var(--muted)}
  .pager button{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:13px}
  .pager button:hover{border-color:var(--accent)}
  .pager button:disabled{opacity:.3;cursor:default}

  footer{color:var(--muted);font-size:12px;margin-top:16px;text-align:center}
  @media(max-width:700px){.wrap{padding:12px} th,td{padding:6px 8px;font-size:12px} input[type=text]{min-width:150px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Data Explorer</h1>
    <a class="back" href="index.html">← Back to Dashboard</a>
  </header>

  <div class="tabs" id="tabs"></div>
  <div class="sheet-desc" id="sheetDesc"></div>
  <div class="controls">
    <input type="text" id="search" placeholder="Search across all columns…">
    <span class="badge" id="rowCount"></span>
    <button class="btn" id="csvBtn">Export CSV</button>
  </div>
  <div class="table-wrap" id="tableWrap">
    <table><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table>
  </div>
  <div class="pager">
    <button id="prevBtn">← Prev</button>
    <span id="pageInfo"></span>
    <button id="nextBtn">Next →</button>
    <span style="margin-left:auto">Rows per page:</span>
    <select id="pageSizeSel" style="background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:13px">
      <option value="50">50</option><option value="100" selected>100</option><option value="250">250</option><option value="999999">All</option>
    </select>
  </div>
  <footer>Data from Komunikacija-konsultacija-konkurentai.xlsx · All financial figures in EUR</footer>
</div>

<script>
const SHEETS = __SHEETS_DATA__;

const SHEET_ORDER = ['Įmonės','Įmonės-analizei','Kūryba','PR','Raw'];
const SHEET_DESC = {
  'Įmonės': 'Master company list — 169 agencies with full contact details, yearly employee counts, salaries, revenue, profit (2019–2024), social links, and credit risk ratings.',
  'Įmonės-analizei': 'Panel data reshaped for analysis — one row per company per year (2019–2024). 660 records covering 110+ brands with financials and segment tags.',
  'Kūryba': 'Creative (kūryba) agencies sub-view — filtered to companies active in the creative/advertising segment with per-company and segment totals.',
  'PR': 'Public relations agencies sub-view — filtered to PR firms with per-company and segment totals.',
  'Raw': 'Original raw data import — 103 companies as sourced, before cleaning and normalization.',
};

const MONEY_COLS = new Set(['Apyvarta','Apyvarta 2019','Apyvarta 2020','Apyvarta 2021','Apyvarta 2022','Apyvarta 2023','Apyvarta 2024',
  'Grynasis pelnas 2019','Grynasis pelnas 2020','Grynasis pelnas 2021','Grynasis pelnas 2022','Grynasis pelnas 2023','Grynasis pelnas 2024',
  'Pelnas','DU sąnaudos','Ne-atlyginimų sąnaudos','Spėjamos pajamos','Atlyginimų sąnaudos 2019','Atlyginimų sąnaudos 2020','Atlyginimų sąnaudos 2021','Atlyginimų sąnaudos 2022','Atlyginimų sąnaudos 2023','Atlyginimų sąnaudos 2024','Atlyginimų sąnaudos 2025 05','Skola Sodrai',
  'Apyvarta (1)','Spėjamos pajamos (1)','DU sąnaudos (1)','Ne-atlyginimų sąnaudos (1)','Pelnas (1)']);
const PCT_COLS_PARTIAL = ['Pokytis','pokytis'];
const URL_COLS_PARTIAL = ['URL','Svetainė','svetainė','Facebook','Instagram','LinkedIn','http'];

let currentSheet = SHEET_ORDER[0];
let sortCol = -1, sortDir = 1;
let page = 0, pageSize = 100;
let filteredRows = [];

function isNumCol(colName, sampleVals){
  if(MONEY_COLS.has(colName)) return true;
  const nums = sampleVals.filter(v=>v!==null && !isNaN(Number(v))).length;
  return nums > sampleVals.length * 0.5;
}

function isPctCol(colName){
  return PCT_COLS_PARTIAL.some(p => colName.includes(p));
}

function isUrlCol(colName){
  return URL_COLS_PARTIAL.some(p => colName.includes(p));
}

function fmtMoney(v){
  if(v===null||v===undefined) return null;
  const n = Number(v);
  if(isNaN(n)) return v;
  if(Math.abs(n) >= 1e6) return '€'+(n/1e6).toFixed(2)+'M';
  if(Math.abs(n) >= 1e3) return '€'+Math.round(n).toLocaleString('lt-LT');
  return '€'+n.toFixed(0);
}

function fmtPct(v){
  if(v===null||v===undefined) return null;
  const n = Number(v);
  if(isNaN(n)) return v;
  return (n>0?'+':'')+(n*100).toFixed(1)+'%';
}

function fmtNum(v){
  if(v===null||v===undefined) return null;
  const n = Number(v);
  if(isNaN(n)) return v;
  if(Number.isInteger(n) || Math.abs(n) > 100) return Math.round(n).toLocaleString('lt-LT');
  return n.toFixed(2);
}

function buildTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = SHEET_ORDER.map(s =>
    `<button class="tab${s===currentSheet?' active':''}" data-sheet="${s}">${s}</button>`
  ).join('');
  el.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', ()=>{
    currentSheet = btn.dataset.sheet;
    sortCol = -1; page = 0;
    document.getElementById('search').value = '';
    buildTabs();
    renderSheet();
  }));
}

function renderSheet(){
  const sheet = SHEETS[currentSheet];
  if(!sheet) return;
  const cols = sheet.columns;
  const rows = sheet.rows;

  document.getElementById('sheetDesc').textContent = SHEET_DESC[currentSheet] || '';

  // Detect column types from first 20 rows sample
  const colTypes = cols.map((c,i) => {
    const sample = rows.slice(0,20).map(r=>r[i]);
    const isMoney = MONEY_COLS.has(c);
    const isPct_ = isPctCol(c);
    const isUrl_ = isUrlCol(c);
    const isNum_ = !isPct_ && !isUrl_ && isNumCol(c, sample);
    return {name:c, isMoney, isPct:isPct_, isUrl:isUrl_, isNum:isNum_||isMoney};
  });

  // Thead
  const thead = document.getElementById('thead');
  thead.innerHTML = '<th class="row-num">#</th>' + cols.map((c,i) =>
    `<th data-col="${i}" class="${sortCol===i?(sortDir===1?'sorted-asc':'sorted-desc'):''}">${c||'—'}</th>`
  ).join('');
  thead.querySelectorAll('th[data-col]').forEach(th => th.addEventListener('click', ()=>{
    const ci = +th.dataset.col;
    if(sortCol===ci) sortDir *= -1; else { sortCol=ci; sortDir=-1; }
    page = 0;
    renderRows();
    // Update sort indicators
    thead.querySelectorAll('th[data-col]').forEach(t=>t.className='');
    th.className = sortDir===1?'sorted-asc':'sorted-desc';
  }));

  // Filter & render
  filterAndRender(colTypes);
}

function filterAndRender(colTypes){
  const sheet = SHEETS[currentSheet];
  const q = document.getElementById('search').value.toLowerCase().trim();

  filteredRows = sheet.rows;
  if(q){
    filteredRows = filteredRows.filter(row =>
      row.some(v => v!==null && String(v).toLowerCase().includes(q))
    );
  }
  // Store colTypes for renderRows
  window._colTypes = colTypes || window._colTypes;
  renderRows();
}

function renderRows(){
  const colTypes = window._colTypes;
  let rows = [...filteredRows];

  // Sort
  if(sortCol >= 0){
    rows.sort((a,b)=>{
      let av=a[sortCol], bv=b[sortCol];
      if(av===null) return 1;
      if(bv===null) return -1;
      const an=Number(av), bn=Number(bv);
      if(!isNaN(an) && !isNaN(bn)) return (an-bn)*sortDir;
      return String(av).localeCompare(String(bv),'lt') * sortDir;
    });
  }

  // Pagination
  const total = rows.length;
  const start = page * pageSize;
  const pageRows = rows.slice(start, start + pageSize);

  document.getElementById('rowCount').textContent = `${total} row${total!==1?'s':''} × ${colTypes.length} columns`;
  document.getElementById('pageInfo').textContent = total>pageSize ? `Page ${page+1} of ${Math.ceil(total/pageSize)}` : '';
  document.getElementById('prevBtn').disabled = page===0;
  document.getElementById('nextBtn').disabled = start+pageSize >= total;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = pageRows.map((row, ri) => {
    const globalIdx = start + ri + 1;
    const cells = row.map((v,ci) => {
      const ct = colTypes[ci];
      if(v===null || v===undefined || v==='None' || v==='\\N'){
        return `<td class="null">—</td>`;
      }
      if(ct.isUrl){
        const s = String(v);
        if(s.startsWith('http')){
          const display = s.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/,'');
          return `<td class="url"><a href="${s}" target="_blank" rel="noopener">${display.length>40?display.slice(0,38)+'…':display}</a></td>`;
        }
        return `<td>${s}</td>`;
      }
      if(ct.isPct){
        const n = Number(v);
        if(!isNaN(n)){
          const cls = n>0?'pos':n<0?'neg':'';
          return `<td class="num ${cls}">${(n>0?'+':'')+(n*100).toFixed(1)}%</td>`;
        }
        return `<td>${v}</td>`;
      }
      if(ct.isMoney){
        const n = Number(v);
        if(!isNaN(n)){
          const cls = n>0?'':n<0?'neg':'';
          return `<td class="num ${cls}">${fmtMoney(n)}</td>`;
        }
        return `<td>${v}</td>`;
      }
      if(ct.isNum){
        const n = Number(v);
        if(!isNaN(n)){
          const cls = ct.name.includes('elnas') ? (n>0?'pos':n<0?'neg':'') : '';
          return `<td class="num ${cls}">${fmtNum(n)}</td>`;
        }
      }
      return `<td>${String(v)}</td>`;
    }).join('');
    return `<tr><td class="row-num">${globalIdx}</td>${cells}</tr>`;
  }).join('');
}

// Search handler
document.getElementById('search').addEventListener('input', ()=>{ page=0; filterAndRender(); });

// Pagination
document.getElementById('prevBtn').addEventListener('click', ()=>{ if(page>0){page--;renderRows();document.getElementById('tableWrap').scrollTop=0;} });
document.getElementById('nextBtn').addEventListener('click', ()=>{ page++; renderRows(); document.getElementById('tableWrap').scrollTop=0; });
document.getElementById('pageSizeSel').addEventListener('change', e=>{ pageSize=+e.target.value; page=0; renderRows(); });

// CSV export
document.getElementById('csvBtn').addEventListener('click', ()=>{
  const sheet = SHEETS[currentSheet];
  const BOM = '﻿';
  const esc = v => {
    if(v===null||v===undefined) return '';
    const s = String(v);
    return s.includes(',') || s.includes('"') || s.includes('\n') ? '"'+s.replace(/"/g,'""')+'"' : s;
  };
  let csv = BOM + sheet.columns.map(esc).join(',') + '\n';
  filteredRows.forEach(row => { csv += row.map(esc).join(',') + '\n'; });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentSheet.replace(/\s+/g,'_') + '.csv';
  a.click();
});

// Init
buildTabs();
renderSheet();
</script>
</body>
</html>
